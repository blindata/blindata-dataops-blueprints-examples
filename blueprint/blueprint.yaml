# Blueprint manifest — Source-Aligned (monorepo, no composition)
# Register via BlueprintRepo.manifestRootPath: blueprint/blueprint.yaml (repository-relative).
spec: odm-blueprint-manifest
specVersion: 1.0.0
name: source-aligned
displayName: "Source-Aligned Data Product"
version: 1.0.0
description: >
  Monorepo blueprint for a source-aligned data product: ingest operational data,
  land immutably in raw storage, transform and load with a dlt pipeline, expose
  datasets via your catalog or warehouse. Provisions S3 (raw/curated), Glue-oriented
  stubs, IAM, a Python dlt skeleton (optional PII hashing), and a production CD workflow stub.

# ----------------------------------------------------------------------------
# PARAMETERS
# Reserved keys (dp*) are auto-filled from the Data Product and profile; the
# instantiation UI groups them under "Auto-filled parameters". See platform docs
# "Reserved parameter keys". Terraform uses domain_slug and dpOwnerId (reserved) for naming
# and tags. The deployment target environment is NOT a blueprint parameter — set it in
# CI/CD when provisioning (e.g. TF_VAR_environment, per-environment tfvars).
# ----------------------------------------------------------------------------
parameters:
  - key: environments
    type: array
    required: true
    default: [dev, prod]
    ui:
      group: General Configuration
      label: Environments
      description: >-
        Deployment stage names for this data product (e.g. dev, prod). Used for DPDS
        lifecycleInfo keys and tags only. The runtime environment for Terraform/dlt is set
        by your CI/CD pipeline when you deploy to each target (not a blueprint parameter).
      formType: stringList

  - key: domain_slug
    type: string
    required: true
    validation:
      pattern: "^[a-z][a-z0-9-]{2,30}$"
    ui:
      group: "1. General configuration"
      label: Domain slug
      description: Short domain identifier used in S3/Glue naming.
      formType: text

  - key: dpDomain
    type: string
    required: true
    ui:
      group: Data Product Details
      label: Data Domain
      description: >-
        Reserved key. The business domain this data product belongs to; auto-filled from the Data
        Product information.
      formType: text

  - key: dpName
    type: string
    required: true
    validation:
      pattern: "^[a-z0-9-]+$"
    ui:
      group: Data Product Details
      label: Data Product Name
      description: >-
        Reserved key. Technical name: lowercase alphanumeric characters and dashes only; auto-filled
        from the Data Product information.
      formType: text

  - key: dpOwnerId
    type: string
    required: true
    ui:
      group: Ownership
      label: Owner ID
      description: >-
        Reserved key. Owner identifier (user username); auto-filled from your profile.
      formType: text

  - key: dpOwnerName
    type: string
    required: true
    ui:
      group: Ownership
      label: Owner Name
      description: >-
        Reserved key. Owner display name; auto-filled from your profile.
      formType: text

  - key: dpFqn
    type: string
    required: true
    ui:
      group: Data Product Details
      label: Data Product FQN
      description: >-
        Reserved key. Unique identifier (URN) for the data product; auto-filled from the Data
        Product information.
      formType: text

  - key: dpDisplayName
    type: string
    required: true
    ui:
      group: Data Product Details
      label: Display Name
      description: >-
        Reserved key. Human-readable name; auto-filled from the Data Product information.
      formType: text

  - key: dpDescription
    type: string
    required: false
    ui:
      group: Data Product Details
      label: Description
      description: >-
        Reserved key. High-level description; auto-filled from the Data Product information.
      formType: text

  - key: data_retention_days
    type: integer
    default: 730
    validation:
      min: 30
      max: 3650
    ui:
      group: "3. Cloud infrastructure"
      label: Data retention (days)
      description: S3 lifecycle expiration for raw layer (and related policies).
      formType: number

  - key: enable_pii_masking
    type: boolean
    default: true
    ui:
      group: "2. Governance & security"
      label: Enable PII masking in dlt
      description: When true, example pipeline hashes designated sensitive fields in Python.
      formType: switch

protectedResources:
  - path: infrastructure/core/**
  - path: .github/workflows/cd-deploy.yml
  - path: pipeline/source_aligned_pipeline.py

instantiation:
  strategy: monorepo
