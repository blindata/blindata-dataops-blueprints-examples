spec: odm-blueprint-manifest
specVersion: 1.0.0
name: gcp-postgres-bigquery-ingest-dpds
displayName: "GCP: PostgreSQL → BigQuery ingest (DPDS-driven)"
version: 1.0.3
description: >
  Provisions BigQuery dataset, GCS staging, and a Cloud Run Job that runs a dlt-based
  extractor driven by a DPDS-aligned data-product-descriptor.json (rendered from Velocity templates).
  Transformation logic lives in transform_hook.py after instantiation.

# ----------------------------------------------------------------------------
# PARAMETERS
# Explicitly declare all inputs required from the user to instantiate this Blueprint.
#
# Reserved keys (dp*) are declared explicitly and auto-filled from the Data Product information and
# your profile; the instantiation UI groups them under "Auto-filled parameters". See
# blueprint/README.md ("Reserved catalog parameters"). Other keys are user-supplied technical
# configuration (GCP, ports, etc.).
# ----------------------------------------------------------------------------
parameters:
  # ----- General Configuration -------------------------------------------------
  - key: environments
    type: array
    required: true
    default: [dev, prod]
    ui:
      group: General Configuration
      label: Environments
      description: >-
        Deployment stage names for this data product (e.g. dev, prod). Used to generate lifecycle
        slots in the descriptor template; edit the list to match your process.
      formType: stringList

  # ----- Data Product Details (reserved, auto-filled) --------------------------
  - key: dpDomain
    type: string
    required: true
    default: ""
    ui:
      group: Data Product Details
      label: Data Domain
      description: >-
        Reserved key. The business domain this data product belongs to; auto-filled from the Data
        Product information.
      formType: text

  - key: dpName
    type: string
    required: true
    default: ""
    validation:
      pattern: '^[a-z0-9-]+$'
    ui:
      group: Data Product Details
      label: Data Product Name
      description: >-
        Reserved key. Technical name: lowercase alphanumeric characters and dashes only; auto-filled
        from the Data Product information.
      formType: text

  - key: dpFqn
    type: string
    required: true
    default: ""
    ui:
      group: Data Product Details
      label: Data Product FQN
      description: >-
        Reserved key. Unique identifier (URN) for the data product; auto-filled from the Data
        Product information.
      formType: text

  - key: dpDisplayName
    type: string
    required: true
    default: ""
    ui:
      group: Data Product Details
      label: Display Name
      description: >-
        Reserved key. Human-readable name; auto-filled from the Data Product information.
      formType: text

  - key: dpDescription
    type: string
    required: false
    default: ""
    ui:
      group: Data Product Details
      label: Description
      description: >-
        Reserved key. High-level description; auto-filled from the Data Product information.
      formType: text

  - key: data_product_version
    type: string
    required: true
    default: "1.0.0"
    validation:
      pattern: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$'
    ui:
      group: Data Product Details
      label: Data product version
      description: Semantic version of the data product (info.version).
      formType: text

  # ----- Ownership (reserved, auto-filled) -------------------------------------
  - key: dpOwnerId
    type: string
    required: true
    default: ""
    ui:
      group: Ownership
      label: Owner ID
      description: >-
        Reserved key. Owner identifier (user username); auto-filled from your profile.
      formType: text

  - key: dpOwnerName
    type: string
    required: true
    default: ""
    ui:
      group: Ownership
      label: Owner Name
      description: >-
        Reserved key. Owner display name; auto-filled from your profile.
      formType: text

  # ----- GCP / Environment -----------------------------------------------------
  - key: gcp_project_id
    type: string
    required: true
    default: "my-gcp-project"
    validation:
      pattern: '^[a-z][a-z0-9-]{4,28}[a-z0-9]$'
    ui:
      group: GCP / Environment
      label: GCP project ID
      description: Target Google Cloud project that hosts BigQuery, GCS staging, Cloud Run and Artifact Registry resources.
      formType: text

  - key: gcp_region
    type: string
    required: true
    default: europe-west1
    validation:
      allowedValues:
        - europe-west1
        - europe-west3
        - europe-west4
        - us-central1
    ui:
      group: GCP / Environment
      label: Region
      description: Region for BigQuery dataset, bucket, and Cloud Run execution.
      formType: dropdown

  # ----- GCP / Terraform -------------------------------------------------------
  - key: tf_state_bucket_address
    type: string
    required: true
    default: "my-tf-state-bucket"
    validation:
      pattern: '^[a-z0-9][a-z0-9_.-]{1,220}[a-z0-9]$'
    ui:
      group: GCP / Terraform
      label: Remote state GCS bucket
      description: >-
        Name (no `gs://` prefix) of a pre-existing GCS bucket that backs the Terraform remote
        state for this product. Rendered into `infrastructure/backend.tf` as the `gcs` backend
        `bucket` and exported to the Deploy workflow as `TF_STATE_BUCKET`. The blueprint does
        **not** create this bucket; provision it once per platform.
      formType: text

  - key: tf_state_prefix
    type: string
    required: true
    default: "blueprints/postgres-bigquery-ingest"
    validation:
      pattern: '^[a-zA-Z0-9/_-]+$'
    ui:
      group: GCP / Terraform
      label: State prefix
      description: >-
        Object-prefix path inside the state bucket where this product's `terraform.tfstate` is
        written (one folder per product to keep states isolated when multiple data products share
        the same state bucket). Rendered into `infrastructure/backend.tf` as the backend `prefix`
        and exported to Deploy as `TF_STATE_PREFIX`.
      formType: text

  # ----- GCP / Delivery --------------------------------------------------------
  - key: artifact_registry_repository
    type: string
    required: true
    default: "data-products"
    validation:
      pattern: '^[a-z][a-z0-9-]{1,62}$'
    ui:
      group: GCP / Delivery
      label: Artifact Registry repository id
      description: >-
        Id of a pre-existing Artifact Registry Docker repository in `gcp_project_id` /
        `gcp_region` where the Publish workflow pushes the runner image
        (`<region>-docker.pkg.dev/<project>/<repo>/<dpName>:<image_tag>`) and from which Cloud Run
        pulls it at deploy time. Repository creation is not managed by this blueprint.
      formType: text

  - key: gcs_staging_bucket
    type: string
    required: true
    default: "my-dlt-staging"
    validation:
      pattern: '^[a-z0-9][a-z0-9_.-]{1,220}[a-z0-9]$'
    ui:
      group: GCP / Delivery
      label: GCS staging bucket name
      description: >-
        Globally unique GCS bucket name (no `gs://` prefix) that dlt uses as a staging tier between
        the extract step and the BigQuery load. Created by Terraform in `gcp_region`; exposed to
        the Cloud Run Job as `INGEST_GCS_STAGING=gs://<bucket>`. Picks up dlt's intermediate
        Parquet files before the load job rewrites them into BigQuery.
      formType: text

  - key: cloud_run_job_name
    type: string
    required: true
    default: "postgres-bigquery-ingest"
    validation:
      pattern: '^[a-z][a-z0-9-]{0,62}$'
    ui:
      group: GCP / Delivery
      label: Cloud Run Job name
      description: >-
        DNS-safe name of the `google_cloud_run_v2_job` resource Terraform creates per environment
        (suffixed with `${environment}` at apply time). This is the job operators run on-demand or
        from Cloud Scheduler to execute one ingest cycle; it carries the pinned image tag plus all
        the `INGEST_*` / credentials env vars.
      formType: text

  # ----- GitHub Actions --------------------------------------------------------
  - key: wif_provider
    type: string
    required: true
    default: "projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github/providers/github-actions"
    ui:
      group: GitHub Actions
      label: Workload Identity Federation provider
      description: >-
        Full resource name of the Workload Identity Federation provider
        (`projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>`)
        passed to `google-github-actions/auth@v2` as `workload_identity_provider`. Lets Publish
        and Deploy authenticate to GCP via OIDC, with no JSON keys stored in the repo.
      formType: text

  - key: wif_service_account
    type: string
    required: true
    default: "deployer@my-gcp-project.iam.gserviceaccount.com"
    ui:
      group: GitHub Actions
      label: WIF service account email
      description: >-
        E-mail of the Google service account that GitHub Actions impersonates (via the WIF
        provider above) to run Publish (push the image to Artifact Registry) and Deploy
        (`terraform apply` against the GCS state backend). Needs at minimum Artifact Registry
        writer, Storage admin on the state bucket, and the IAM rights Terraform uses to manage
        the rest of the stack.
      formType: text

  # ----- Input port (PostgreSQL) -----------------------------------------------
  # Narrative: how to connect → what to read → row/port shape → catalog metadata
  - key: postgres_secret_id
    type: string
    required: true
    default: "postgres-readonly-uri"
    ui:
      group: Input port (PostgreSQL)
      label: Secret Manager secret id (Postgres)
      description: >-
        Bare Secret Manager secret id (no project path) holding the **read-only** PostgreSQL
        connection material. Terraform mounts the latest version into the Cloud Run Job at
        `/secrets/postgres/credentials`; the runner reads it via `SOURCES__POSTGRES__CREDENTIALS`.
        Payload may be a SQLAlchemy URI (`postgresql+psycopg://user:pwd@host:5432/db`) or a JSON
        object with `host` / `user` / `password` / `database` (and optional `port`).
      formType: text

  - key: postgres_database_name
    type: string
    required: true
    default: "postgres"
    validation:
      pattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,62}$'
    ui:
      group: Input port (PostgreSQL)
      label: PostgreSQL database name
      description: >-
        Logical PostgreSQL database the input ports describe. Rendered as `promises.platform` on
        every generated input port (the catalog's notion of "database"). Documentation /
        contract-side value only — the actual connection still comes from the secret and **must**
        target the same database for the contract to be truthful.
      formType: text

  - key: input_schemas
    type: array
    required: true
    default: ["public"]
    validation:
      min: 1
      max: 500
    ui:
      group: Input port (PostgreSQL)
      label: PostgreSQL schemas (one input port each)
      description: >-
        List of PostgreSQL schema names this product is authorized to read. The Velocity template
        emits **one `datastoreapi` input port per entry** (named `${input_port_name_prefix}<idx>`,
        with `databaseSchemaName` set to the schema). At runtime the extractor opens one
        connection per port and reads `source_table_name` from each, tagging every row with
        `row_discriminator_column = <schema>` so consumers can tell rows apart after
        consolidation.
      formType: stringList

  - key: source_table_name
    type: string
    required: true
    default: "events"
    validation:
      pattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,62}$'
    ui:
      group: Input port (PostgreSQL)
      label: Source table name
      description: >-
        Physical PostgreSQL table name to read. The runner expects the **same table name in every
        schema** listed in `input_schemas` and uses it both as `tables[0].name` on each input port
        and as the table the bounded `SELECT` queries hit at extraction time.
      formType: text

  - key: row_discriminator_column
    type: string
    required: true
    default: source_schema
    validation:
      pattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,62}$'
    ui:
      group: Input port (PostgreSQL)
      label: Row discriminator column
      description: >-
        Name of an extra column the extractor **injects** into every emitted row, filled with the
        source schema name (e.g. `source_schema = "tenant_a"`). Lets `transform_hook.py` and
        downstream queries tell rows apart after the multi-schema consolidation; also a natural
        candidate for BigQuery clustering. Exposed to the runner as
        `INGEST_ROW_DISCRIMINATOR_COLUMN`.
      formType: text

  - key: cursor_field
    type: string
    required: false
    default: ""
    validation:
      pattern: '^$|^[a-zA-Z_][a-zA-Z0-9_]{0,62}$'
    ui:
      group: Input port (PostgreSQL)
      label: Cursor field (optional)
      description: >-
        Optional source column used for **incremental extraction**. When set, the runner persists
        the max value seen so far at `CURSOR_STATE_PATH` and only fetches rows with
        `<cursor_field> > <watermark>` on the next run. Leave empty to run **full snapshots**
        every time. Surfaced to the runner as `INGEST_CURSOR_FIELD`.
      formType: text

  - key: input_port_name_prefix
    type: string
    required: true
    default: pgin
    validation:
      pattern: '^[a-z][a-z0-9]{1,12}$'
    ui:
      group: Input port (PostgreSQL)
      label: Input port name prefix
      description: >-
        Prefix used to mint the machine name of every generated input port. Names are
        `${prefix}<index>` (e.g. `pgin0`, `pgin1`) and the matching `fullyQualifiedName` becomes
        `${dpFqn}:inputports:${prefix}<index>`. Keep it short, lowercase and DNS-safe — it ends
        up in URNs and Terraform identifiers.
      formType: text

  - key: input_port_version
    type: string
    required: true
    default: "1.0.0"
    validation:
      pattern: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$'
    ui:
      group: Input port (PostgreSQL)
      label: Input port version
      description: Semantic version applied to every generated PostgreSQL input port in the descriptor.
      formType: text

  - key: dependsOn
    type: string
    required: true
    default: ""
    ui:
      group: Input port (PostgreSQL)
      label: dependsOn (Blindata system name)
      description: >
        Metadata only: emitted on the input port as a string "dependsOn": "<value>".
        Not read by the ingest runner; for catalog / lineage (Blindata system name or URN).
      formType: text

  # ----- Output port (BigQuery) ------------------------------------------------
  # Narrative: how to connect → target table → physical shape → port shape
  - key: bigquery_secret_id
    type: string
    required: true
    default: "bigquery-loader-sa-json"
    ui:
      group: Output port (BigQuery)
      label: Secret Manager secret id (BigQuery SA)
      description: >-
        Bare Secret Manager secret id (no project path) holding the **BigQuery service account
        JSON key** that dlt uses to authenticate against the destination. Terraform mounts the
        secret at `/secrets/bq/credentials.json` and the runner reads it via
        `DESTINATION__BIGQUERY__CREDENTIALS` / `GOOGLE_APPLICATION_CREDENTIALS`. Needs at least
        BigQuery dataEditor + jobUser on the load dataset and objectAdmin on the staging bucket.
      formType: text

  - key: bq_dataset_id
    type: string
    required: true
    default: "ingest_consolidated"
    validation:
      pattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,1023}$'
    ui:
      group: Output port (BigQuery)
      label: BigQuery dataset ID
      description: >-
        BigQuery dataset that holds the consolidated output table. Created by Terraform in
        `gcp_project_id` / `gcp_region` and also stamped on the output port as
        **`promises.platform`** and **`databaseSchemaName`** (BigQuery datasets play the role of
        "schema" in the datastoreapi contract). dlt writes the load into
        `${gcp_project_id}.${bq_dataset_id}.${bq_table_id}`.
      formType: text

  - key: bq_table_id
    type: string
    required: true
    default: "events"
    validation:
      pattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,1023}$'
    ui:
      group: Output port (BigQuery)
      label: BigQuery table ID
      description: >-
        BigQuery table id where dlt writes the consolidated rows (full path
        `${gcp_project_id}.${bq_dataset_id}.${bq_table_id}`). Same value is rendered as
        `tables[0].name` on the output port and used by the dlt resource as
        `write_disposition="replace"` — i.e. each run **replaces** the table contents with the
        validated output of `transform_hook.py`.
      formType: text

  - key: bq_partition_field
    type: string
    required: true
    default: "loaded_at"
    validation:
      pattern: '^[a-zA-Z_][a-zA-Z0-9_]{0,62}$'
    ui:
      group: Output port (BigQuery)
      label: Partition column
      description: >-
        Column the BigQuery output table is time-partitioned on (typically a `DATE` or
        `TIMESTAMP` field such as `loaded_at` or an event date). Lets BigQuery prune partitions
        for time-range queries, dropping bytes scanned and cost. Passed to the runner as
        `INGEST_BQ_PARTITION_FIELD` (and is intended to be applied to the physical table when
        the table-creation path wires it in).
      formType: text

  - key: bq_cluster_fields
    type: array
    required: true
    default: ["source_schema"]
    validation:
      min: 1
      max: 4
    ui:
      group: Output port (BigQuery)
      label: Clustering columns
      description: >-
        Ordered list of 1–4 columns BigQuery uses to cluster the output table (block-level
        sort within each partition). Order matters — put the column you filter on most often
        first. Drastically reduces bytes scanned for equality / range filters / joins on those
        columns. Passed to the runner as a CSV in `INGEST_BQ_CLUSTER_FIELDS`. A common choice
        here is `row_discriminator_column` so queries scoped to a single source schema prune
        cleanly.
      formType: stringList

  - key: output_port_name
    type: string
    required: true
    default: bigQueryConsolidated
    validation:
      pattern: '^[a-z][a-zA-Z0-9]{1,62}$'
    ui:
      group: Output port (BigQuery)
      label: DPDS output port name
      description: Machine name of the BigQuery output port emitted in the DPDS descriptor (lowerCamelCase, DNS-safe).
      formType: text

  - key: output_port_display_name
    type: string
    required: false
    default: ""
    ui:
      group: Output port (BigQuery)
      label: Output port display name
      description: Falls back to output port name when empty.
      formType: text

  - key: output_port_version
    type: string
    required: true
    default: "1.0.0"
    validation:
      pattern: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$'
    ui:
      group: Output port (BigQuery)
      label: Output port version
      description: Semantic version recorded on the BigQuery output port in the descriptor.
      formType: text

protectedResources:
  - path: application/pyproject.toml
  - path: infrastructure/main.tf
  - path: infrastructure/variables.tf
  - path: infrastructure/outputs.tf
  - path: infrastructure/iam.tf
  - path: infrastructure/cloud_run.tf
  - path: infrastructure/versions.tf

instantiation:
  strategy: monorepo
